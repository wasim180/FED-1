<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>calculator</title>
    <style>
        h1{
            text-align: center;  
        }
        h2{
            text-align: center;
        }
        #box{
            text-align: center;
            border: 2px solid black;
            margin-left: 28%;
            margin-top: 70px;
            height: 400px;
            width: 600px;
            text-align: center;
        }
        label{
            margin-top: 25px;

        }
        input{
            margin-top: 30px;
            margin-left: 35px;
            height: 40px;
            border: 2px solid black;
            width: 350px;
        }
        #fahr{
            margin-left: 5px;
        }
        #kelv{
            margin-left: 39px;
        }
    </style>
</head>
<body>
    <h1>TEMPERATURE CONVERTER</h1>
    <h2>Celsius to Fahrenheit to Kelvin</h2>

    <div id="box">
        <h3> Temperature Calculator</h3>
        <label for="cel">Celsius:-</label>
        <input type="text" id="cels" placeholder="Enter temperature in Celsius."><br>

        <label for="fahr">Fahrenheit:-</label>
        <input type="text" id="fahr" placeholder="Enter temperature in Fahrenheit"><br>

        <label for="kellv">Kelvin:-</label>
        <input type="text" id="kelv" placeholder="Enter temperature in Kelvin.">

    </div>
    
</body>
</html>
