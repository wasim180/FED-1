<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>get element by</title>
</head>
<body>
    <p class="abc">Lorem ipsum dolor sit amet consectetur adipisicing elit. Saepe, ad.</p>
    <p class="abc">wolrd</p>
    <p class="abc">Lorem, ipsum dolor sit amet consectetur adipisicing elit. Ipsa culpa dicta consectetur! Sapiente, qui consequuntur!</p>
    <h1>hello</h1>
    

<script>
    document.getElementsByClassName('abc');                     //geting elementby class name.
     console.log( document.getElementsByClassName('abc'));   
     document.getElementsByTagName('p');                        // getting element by tag name.
     console.log( document.getElementsByTagName('p'));     
      document.getElementsByTagName('h1');                        // getting element by tag name.
     console.log( document.getElementsByTagName('h1'));  
</script>


</body>
</html>
