<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <script>const student = {
  firstName: "ram",
  middlename: "kumar",
  lastName: "Doe",

  // Getter
  get fullName() {
    return this.firstName + " " + this.middlename+ "" +this.lastName;
  },

  // Setter
  set fullName(name) {
    const parts = name.split(" ");
    this.firstName = parts[0];
    this.middlename=parts[1]
    this.lastName = parts[2];
  }
};

// Using getter//console.log(student.fullName); 
// Output: John  kumar Doe

// Using setter+
student.fullName = "Alice kumar deo ";

console.log(student.firstName); 
// Output: Alice
console.log(student.middlename);
//output:kumar

console.log(student.lastName);  
// Output: deo
</script>
</body>
</html>
