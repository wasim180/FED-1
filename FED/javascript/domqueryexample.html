<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Queryselector</title>
</head>
<body>
    <p>hello</p>
    <p>wolrd</p>
    <p>hii</p>
    <p>hellllllo</p> <!--3rd paragraph-->
    <p>abc</p><!--4th para-->
    <p>def</p>
    <p>ghi</p>
    <p>klm</p>
    <p>nop</p>

<script>
    document.querySelector('p');
    console.log(document.querySelector('p'));
    document.querySelectorAll('p');
    console.log(document.querySelectorAll('p'));
    document.querySelectorAll('p')[3];
    console.log( document.querySelectorAll('p')[3]);
    document.querySelectorAll('p')[4];
    console.log( document.querySelectorAll('p')[4]);
</script>


</body>
</html>
